{{ define "main" }}
<section class="projects-page">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{- with .Description }}<p class="page-description">{{ . }}</p>{{- end }}
  </header>

  <ul class="project-grid" role="list">
    {{- range .Pages.ByParam "weight" }}
    {{ partial "project-card.html" . }}
    {{- end }}
  </ul>
</section>
{{ end }}
