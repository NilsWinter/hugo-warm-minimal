{{ define "main" }}
<section class="list-page">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{- with .Content }}<div class="page-description">{{ . }}</div>{{- end }}
  </header>

  <ul class="item-list">
    {{- range .Pages }}
    <li class="item-list__entry">
      <a href="{{ .Permalink }}">{{ .Title }}</a>
      {{- if not .Date.IsZero }}
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2006" }}</time>
      {{- end }}
      {{- with .Summary }}<p>{{ . }}</p>{{- end }}
    </li>
    {{- end }}
  </ul>
</section>
{{ end }}
