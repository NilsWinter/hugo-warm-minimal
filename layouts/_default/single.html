{{ define "main" }}
<article class="prose{{ if and .Site.Params.features.toc .Fragments.Headings }} prose--has-toc{{ end }}">
  {{ partial "prose-toc.html" . }}
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{- if not .Date.IsZero }}
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
    {{- end }}
  </header>

  <div class="content">
    {{ .Content }}
  </div>
</article>
{{ end }}
