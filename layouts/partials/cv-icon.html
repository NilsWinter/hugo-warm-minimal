{{- /* CV section icon. Context (.) is the icon name string. */ -}}
{{- $icon := . -}}
{{- if eq $icon "briefcase" -}}
<svg class="cv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
  <rect x="3" y="7" width="18" height="13" rx="2"/>
  <path d="M8 7 V5.5 A1.5 1.5 0 0 1 9.5 4 H14.5 A1.5 1.5 0 0 1 16 5.5 V7"/>
  <path d="M3 12.5 H21"/>
</svg>
{{- else if eq $icon "school" -}}
<svg class="cv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
  <path d="M2.5 9 L12 5 L21.5 9 L12 13 Z"/>
  <path d="M21.5 9 V13.5"/>
  <path d="M6.5 10.8 V15 C6.5 15 8.8 17 12 17 C15.2 17 17.5 15 17.5 15 V10.8"/>
</svg>
{{- else if eq $icon "flask" -}}
<svg class="cv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
  <path d="M9 3 H15"/>
  <path d="M10 3 V9.5 L5.2 17.5 A1.4 1.4 0 0 0 6.4 20 H17.6 A1.4 1.4 0 0 0 18.8 17.5 L14 9.5 V3"/>
  <path d="M7.3 14 H16.7"/>
</svg>
{{- else if eq $icon "award" -}}
<svg class="cv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
  <circle cx="12" cy="9" r="5"/>
  <path d="M8.5 13.3 L7 21 L12 18 L17 21 L15.5 13.3"/>
</svg>
{{- end -}}
