<header class="site-header" role="banner">
  <div class="site-header__inner">
    <a class="site-header__logo" href="{{ "/" | relURL }}">
      {{ .Site.Title }}
    </a>
    <button class="site-nav__toggle" type="button" aria-expanded="false" aria-controls="site-nav" aria-label="Open menu">
      <svg class="icon-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" focusable="false">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      <svg class="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" focusable="false">
        <line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/>
      </svg>
    </button>
    {{ partial "nav.html" . }}
  </div>
</header>
