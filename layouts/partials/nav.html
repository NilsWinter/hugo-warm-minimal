<nav class="site-nav" id="site-nav" aria-label="Main navigation">
  <ul class="site-nav__list" role="list">
    {{- range .Site.Menus.main }}
    <li class="site-nav__item">
      <a class="site-nav__link{{ if $.IsHome | and (eq .URL "/") }} is-active{{ else if strings.HasPrefix $.RelPermalink .URL }} is-active{{ end }}"
         href="{{ .URL | relURL }}">
        {{ .Name }}
      </a>
    </li>
    {{- end }}
  </ul>
</nav>
